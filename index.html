<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Hub - Smart Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">Home Hub</h1>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <button type="button" class="nav-item active" data-view="home">
                    <span class="nav-text">Home</span>
                </button>
                <!-- Module pages injected by script.js from HomeHubModules -->
            </nav>

            <!-- Developer Section -->
            <div class="developer-section">
                <div class="developer-header">
                    <span class="developer-text">Developer</span>
                </div>
                <div class="developer-actions">
                    <button class="developer-btn" id="clearWidgetsBtn" title="Clear All Widgets">
                        <span class="btn-text">Clear All</span>
                    </button>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="add-module-btn" id="addModuleBtn">
                    <span>+</span> Add Widget
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <h2 class="page-title" id="pageTitle">Home</h2>
                    <div class="time-display" id="timeDisplay">
                        <span class="time-value" id="timeValue"></span>
                        <span class="date-value" id="dateValue"></span>
                    </div>
                </div>
                <div class="top-bar-actions">
                    <div class="sync-status disconnected" id="syncStatus" title="Sync Status">
                        <span class="sync-icon">Sync</span>
                    </div>
                    <button class="icon-btn" id="darkModeBtn" title="Toggle Dark Mode">
                        Theme
                    </button>
                    <button class="icon-btn" id="refreshBtn" title="Refresh">
                        Refresh
                    </button>
                    <button class="icon-btn" id="fullscreenBtn" title="Fullscreen">
                        Full
                    </button>
                </div>
            </header>

            <!-- Home: widgets -->
            <div class="modules-grid" id="modulesGrid" data-view-panel="home">
                <!-- Widgets added here -->
            </div>

            <!-- Logs module page -->
            <section class="module-page logs-view" id="logsView" data-view-panel="logs" hidden>
                <div class="logs-toolbar">
                    <div class="logs-filters" id="logsFilters" role="group" aria-label="Log type filter">
                        <button type="button" class="logs-filter-btn active" data-filter="all">All</button>
                        <button type="button" class="logs-filter-btn" data-filter="info">Info</button>
                        <button type="button" class="logs-filter-btn" data-filter="warn">Warn</button>
                        <button type="button" class="logs-filter-btn" data-filter="error">Error</button>
                    </div>
                    <div class="logs-toolbar-meta">
                        <span id="logsVisibleCount">0 shown</span>
                        <span class="logs-toolbar-sep">/</span>
                        <span id="logsTotalCount">0 total</span>
                    </div>
                </div>
                <div class="logs-list" id="logsList">
                    <div class="logs-empty">Waiting for server logs...</div>
                </div>
            </section>

            <!-- Network Analyzer module page -->
            <section class="module-page network-view" id="networkView" data-view-panel="network" hidden>
                <div id="networkViewBody">
                    <div class="network-history-empty">Loading network analyzer...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Widget Modal -->
    <div class="modal" id="addModuleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Widget</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="moduleName">Widget Name</label>
                    <input type="text" id="moduleName" placeholder="e.g., Living Room Temperature">
                </div>
                <div class="form-group">
                    <label for="moduleType">Widget Type</label>
                    <select id="moduleType">
                        <option value="temperature">Temperature</option>
                        <option value="lighting">Lighting</option>
                        <option value="security">Security</option>
                        <option value="energy">Energy</option>
                        <option value="weather">Weather</option>
                        <option value="speed_test">Speed Test</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="moduleSize">Size</label>
                    <select id="moduleSize">
                        <option value="small">Small (1x1)</option>
                        <option value="medium" selected>Medium (2x1)</option>
                        <option value="large">Large (2x2)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
                <button class="btn btn-primary" id="addBtn">Add Widget</button>
            </div>
        </div>
    </div>

    <script src="modules/activity/client.js"></script>
    <script src="modules/network/client.js"></script>
    <script src="script.js"></script>
</body>

</html>
